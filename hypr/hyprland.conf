# #######################################################################################
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/Configuring-Hyprland/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
source = ~/.config/hypr/colors.conf

################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=eDP-1,1920x1080@144,0x0,1
# HDMI
monitor=,preferred,auto,1,mirror

# monitor=HDMI-A-1,preferred,auto,1
# monitor=HEADLESS-2,1364x768@60,1920x0,1


###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = kitty $terminal_opts
$terminal_opts = --single-instance
$fileManager = thunar

# bemenu config is too long, so i made an scripts
$menu = ~/scripts/bemenu/bemenu_gruvbox.sh
#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = waybar
exec-once = hyprpaper
exec-once = wl-paste --watch cliphist store
exec-once = nm-applet
exec-once = xrdb -merge ~/.Xresources
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = keyd-application-mapper -d

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XDG_SESSION_DESKTOP, Hyprland

# blender invisible cursor fix
cursor {
    no_hardware_cursors = true
}
#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 0
    gaps_out = 00

    border_size = 1
# https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(dfdfaf99)
    col.inactive_border = rgba(59595900)

# Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

# Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 00

# Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.9

# https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = false
        size = 5
        passes = 2

        vibrancy = 0.1696
        new_optimizations = true
    }

    shadow {
        enabled = false
        range = 20
        render_power = 2
        ignore_window = true
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = false

    bezier = fluent_decel, 0, 0.2, 0.4, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutCubic, 0.33, 1, 0.68, 1
    bezier = easeinoutsine, 0.37, 0, 0.63, 1

    # Windows
    animation = windowsIn, 1, 1.5, easeinoutsine, popin 60% # window open
    animation = windowsOut, 1, 1.5, easeOutCubic, popin 60% # window close.
    animation = windowsMove, 1, 1.5, easeinoutsine, slide # everything in between, moving, dragging, resizing.

    # Fading
    animation = fade, 1, 2.5, fluent_decel

	animation = fadeLayersIn, 0
    animation = border, 0


	# Layers
	animation = layers, 1, 1.5, easeinoutsine, popin

    # Workspaces
    #animation = workspaces, 1, 3, fluent_decel, slidefade 30% # styles: slide, slidevert, fade, slidefade, slidefadevert
    animation = workspaces, 1, 3, fluent_decel, slidefadevert 30% # styles: slide, slidevert, fade, slidefade, slidefadevert

	animation = specialWorkspace, 1, 2, fluent_decel, slidefade 10%
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}

cursor {
    no_warps = false
}

#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us,ru
    kb_variant =
    kb_model =
    kb_options = grp:alt_shift_toggle, caps:escape

    follow_mouse = 0
    float_switch_override_focus = 0
    sensitivity = 0.0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
        disable_while_typing = true
    }

    repeat_delay = 250
    repeat_rate = 60
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
    workspace_swipe = true
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = logitech-g102-lightsync-gaming-mouse
    sensitivity = -0.7
}


####################
### KEYBINDINGS  ###
####################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, Q, killactive,
bind = SUPER SHIFT, ESCAPE, exit,
bind = SUPER SHIFT, SPACE, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, V, togglesplit, # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move focus with mainMod + vim keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move window with mainMod + SHIFT + vim keys
bind = SUPER SHIFT, H, movewindow, l
bind = SUPER SHIFT, L, movewindow, r
bind = SUPER SHIFT, K, movewindow, u
bind = SUPER SHIFT, J, movewindow, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# Window resizing                           X  Y
bind = $mainMod CTRL, H, resizeactive, -60 0
bind = $mainMod CTRL, L, resizeactive,  60 0
bind = $mainMod CTRL, K, resizeactive,  0 -60
bind = $mainMod CTRL, J, resizeactive,  0  60

# Example special workspace (scratchpad)
# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind=SUPER, F, fullscreen
# bind = SUPER SHIFT, SPACE, exec, hyprctl dispatch cycleprev

# Cycle through windows
bind = ALT, TAB, cyclenext
bind = ALT, SHIFT TAB, bringactivetotop

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule v1
# windowrule = float, ^(kitty)$
windowrule = workspace 2, class:^(firefox|Firefox)$
windowrule = workspace 8, class:^(spotify|Spotify)$
windowrule = workspace 9, class:^(org.telegram.desktop)$
# sometimes working with 2 instances of unity on differrent workspaces
windowrule = workspace 4, class:^(unityhub|UnityHub)$
# windowrule = workspace 4, class:^(unity|Unity)$


# To replicate “smart gaps” / “no gaps when only” from other WMs/Compositors, use this bad boy:
windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
windowrule = bordersize 0, floating:0, onworkspace:f[1]

windowrulev2 = suppressevent maximize, class:.* # You'll probably like this. New floating window on top of others

# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$

# custom windows for custom scripts
windowrulev2 = float,title:^(basilkTerm)$
windowrulev2 = size 1000 600,title:^(basilkTerm)$

windowrulev2 = float,title:^(basilkPETerm)$
windowrulev2 = size 800 700,title:^(basilkPETerm)$

windowrulev2 = float,title:^(pythonCalcTerm)$
windowrulev2 = size 400 200,title:^(pythonCalcTerm)$

windowrulev2 = float,title:^(vimNotes)$
windowrulev2 = size 800 700,title:^(vimNotes)$

windowrulev2 = float,title:^(screenshots)$
windowrulev2 = size 400 400,title:^(screenshots)$

windowrulev2 = float,class:^(unityhub)$
windowrulev2 = size 1000 600,class:^(unityhub)$

# old unity
# windowrulev2 = minsize 230 200, initialTitle:(UnityEditor.AddComponent.AddComponentWindow)
# windowrulev2 = minsize 300 200, initialTitle:(UnityEditor.IMGUI.Controls.AdvancedDropdownWindow)
# windowrulev2 = minsize 230 200, initialTitle:(UnityEditor.Rendering.FilterWindow)
# windowrulev2 = minsize 300 200, initialTitle:(UnityEditor.LayerVisibilityWindow)
# windowrulev2 = minsize 230 500, initialTitle:(UnityEditor.AnnotationWindow)
# windowrulev2 = minsize 150 300, initialTitle:(UnityEditor.PopupWindow)
# windowrulev2 = minsize 500 350, initialTitle:(Select Preset...)
# windowrulev2 = minsize 300 100, initialTitle:(UnityEditor.Snap.GridSettingsWindow)
# windowrulev2 = minsize 500 500, initialTitle:(UnityEngine.InputSystem.Editor.AdvancedDropdownWindow)

# workspaces
workspace = 1,monitor:eDP-1
workspace = 2,monitor:HDMI-A-1
workspace = 3,monitor:eDP-1
workspace = 4,monitor:eDP-1
workspace = 5,monitor:eDP-1
workspace = 6,monitor:eDP-1
workspace = 7,monitor:HDMI-A-1
workspace = 8,monitor:HDMI-A-1
workspace = 9,monitor:HDMI-A-1
workspace = 0,monitor:HDMI-A-1

# Custom binds
source = ~/.config/hypr/custom_binds.conf
