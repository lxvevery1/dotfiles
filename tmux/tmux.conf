# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# extended-keys for properly working <C-S-some_key>
set -g extended-keys on

set -g status-style bg=green
set -g status-style fg=gray

# default one
set -g status-right '#[fg=#dfdfaf] "#{=21:pane_title}" %H:%M %d-%b-%y'

bind r source-file ~/.config/tmux/tmux.conf \; display "~/.config/tmux/tmux.conf sourced"

# vim navigation between panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vim resizing windows
bind-key -r -T prefix C-h resize-pane -L
bind-key -r -T prefix C-j resize-pane -D
bind-key -r -T prefix C-k resize-pane -U
bind-key -r -T prefix C-l resize-pane -R

# change windows order
bind-key -n C-S-Left swap-window -t -1
bind-key -n C-S-Right swap-window -t +1
bind-key -n C-S-h swap-window -t -1
bind-key -n C-S-l swap-window -t +1

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# for vim
set -g @resurrect-strategy-vim 'session'
# for neovim
set -g @resurrect-strategy-nvim 'session'

# vi mode
set-window-option -g mode-keys vi

set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"

set -g window-status-separator ' '
set -g window-status-current-format '#[fg=#dfdfaf,bg=#222222][#{?window_flags,#I: ,#I }#W]'
set -g window-status-format '#[fg=#878787,bg=#222222] #I:#W '

# copy to system clipboard
set-option -g mouse on
set-option -s set-clipboard on
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"
